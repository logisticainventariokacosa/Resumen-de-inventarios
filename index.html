<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KACOSA · Centro de Control de Inventarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --navy:#12213B;
    --navy-2:#1B3358;
    --steel:#2D6E8E;
    --steel-light:#4C93B5;
    --amber:#E8963C;
    --green:#3E9C6E;
    --red:#D5573B;
    --bg:#F3F5F8;
    --card:#FFFFFF;
    --line:#E3E7EE;
    --text:#16202E;
    --muted:#6B7686;
    --radius:14px;
    --mono:'JetBrains Mono',monospace;
    --sans:'Manrope',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);}
  a{color:inherit;}

  /* ===== Topbar ===== */
  .topbar{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;
    padding:18px 24px;
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:12px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 4px 18px rgba(18,33,59,.25);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:38px;height:38px;border-radius:9px;
    object-fit:cover;flex-shrink:0;
  }
  .brand .mark-fallback{
    background:repeating-linear-gradient(90deg,#fff 0 3px, transparent 3px 6px);
    background-color:var(--amber);
    align-items:center;justify-content:center;
  }
  .brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.2px;}
  .brand span{display:block;font-size:11px;color:#B9C6DA;font-weight:500;letter-spacing:.4px;text-transform:uppercase;}
  .status-pill{
    font-family:var(--mono);font-size:11px;color:#B9C6DA;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;
  }
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(62,156,110,.25);}

  /* ===== Layout ===== */
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px;}

  /* ===== KPI grid ===== */
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px;}
  @media(max-width:980px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 14px;position:relative;overflow:hidden;
  }
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--steel);}
  .kpi.amber::before{background:var(--amber);}
  .kpi.green::before{background:var(--green);}
  .kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .kpi .value{font-family:var(--mono);font-size:26px;font-weight:700;margin-top:6px;color:var(--navy);}

  /* ===== Filter bar ===== */
  .filters{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:22px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;
  }
  .field{display:flex;flex-direction:column;gap:6px;min-width:220px;flex:1;}
  .field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  select,input[type=text]{
    font-family:var(--sans);font-size:14px;padding:10px 12px;border-radius:9px;
    border:1.5px solid var(--line);background:#fff;color:var(--text);
  }
  select:focus,input:focus{outline:none;border-color:var(--steel);}
  .btn-clear{
    background:var(--bg);border:1.5px solid var(--line);color:var(--muted);
    padding:10px 16px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;
  }
  .btn-clear:hover{border-color:var(--red);color:var(--red);}

  /* ===== Section ===== */
  .section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy-2);margin:28px 0 12px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  @media(max-width:800px){.grid-2{grid-template-columns:1fr;}}

  .detail-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .detail-header h2{margin:0;font-size:20px;font-weight:800;color:var(--navy);}
  .badge{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;}
  .badge.on{background:rgba(62,156,110,.12);color:var(--green);}
  .badge.off{background:rgba(213,87,59,.12);color:var(--red);}

  .stat-list{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;margin-top:8px;}
  .stat-list .item{border-bottom:1px dashed var(--line);padding-bottom:8px;}
  .stat-list .k{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;}
  .stat-list .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--navy);margin-top:2px;}

  .progress-track{height:10px;border-radius:6px;background:var(--line);overflow:hidden;margin:10px 0 4px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--steel),var(--steel-light));}

  .tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tag{
    font-size:12px;background:var(--bg);border:1px solid var(--line);padding:4px 10px;border-radius:20px;
    color:var(--navy-2);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
    transition:border-color .15s, background .15s;
  }
  .tag:hover{border-color:var(--steel);background:#fff;}
  .tag.selected{border-color:var(--steel);background:rgba(45,110,142,.08);}
  .tag .actual-flag{color:var(--green);font-weight:800;font-size:10px;text-transform:uppercase;letter-spacing:.3px;}

  .sub-detail{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;}

  .progress-label{
    display:flex;justify-content:space-between;align-items:baseline;margin:10px 0 4px;
    font-family:var(--mono);font-size:12px;color:var(--muted);
  }
  .progress-label b{color:var(--navy);font-size:13px;}

  .empty-state{text-align:center;padding:30px 10px;color:var(--muted);font-size:14px;}

  /* ===== Loading spinner ===== */
  .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 10px;color:var(--muted);}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--steel);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-wrap span{font-family:var(--mono);font-size:12px;letter-spacing:.3px;}

  /* ===== Chart legend ===== */
  .chart-legend{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .chart-legend .row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .chart-legend .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
  .chart-legend .name{flex:1;color:var(--text);font-weight:600;}
  .chart-legend .val{font-family:var(--mono);color:var(--muted);font-size:12px;}
  .chart-legend .pct{font-family:var(--mono);font-weight:700;color:var(--navy);min-width:48px;text-align:right;}

  canvas{max-height:230px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img class="mark" src="logo.png" alt="KACOSA" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="mark mark-fallback" style="display:none;"></div>
    <div>
      <h1>KACOSA</h1>
      <span>Centro de Control de Inventarios</span>
    </div>
  </div>
  <div class="status-pill"><span class="status-dot"></span><span id="lastUpdate">Cargando...</span></div>
</div>

<div class="wrap">

  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi"><div class="label">Tiendas activas</div><div class="value" id="kTiendas">–</div></div>
    <div class="kpi"><div class="label">Analistas activos</div><div class="value" id="kAnalistas">–</div></div>
    <div class="kpi"><div class="label">Códigos contados</div><div class="value" id="kCodigos">–</div></div>
    <div class="kpi"><div class="label">Piezas contadas</div><div class="value" id="kPiezas">–</div></div>
    <div class="kpi amber"><div class="label">Con diferencia</div><div class="value" id="kDif">–</div></div>
    <div class="kpi green"><div class="label">Sin diferencia</div><div class="value" id="kOk">–</div></div>
  </div>

  <div class="filters">
    <div class="field">
      <label for="selTienda">Filtrar por tienda</label>
      <select id="selTienda"><option value="">Todas / vista general</option></select>
    </div>
    <div class="field">
      <label for="selAnalista">Filtrar por analista</label>
      <select id="selAnalista"><option value="">Todos / vista general</option></select>
    </div>
    <button class="btn-clear" id="btnClear">Limpiar filtros</button>
  </div>

  <div id="content">
    <div class="loading">Cargando datos desde Google Sheets…</div>
  </div>

</div>

<script>
/* ⚠️ Reemplaza con la URL /exec de tu implementación de Apps Script */
const API_URL = 'https://script.google.com/macros/s/AKfycbyj2o46o0q1r5B2QW0GwGGTZMWs_B5w2W7qs9eZAutXAu7NhiuTdaLo1IOSmFpfUfcl/exec';

Chart.register(ChartDataLabels);

const $ = id => document.getElementById(id);
let chartRefs = [];

async function api(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  if (params) Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url);
  return res.json();
}

function fmt(n) {
  return new Intl.NumberFormat('es-VE').format(Math.round(n || 0));
}

function destroyCharts(){ chartRefs.forEach(c => c.destroy()); chartRefs = []; }

function showLoading(target) {
  target.innerHTML = `<div class="card loading-wrap"><div class="spinner"></div><span>Cargando datos…</span></div>`;
}

async function loadResumen() {
  const r = await api('resumen');
  if (r.error) return;
  $('kTiendas').textContent = fmt(r.tiendasActivas);
  $('kAnalistas').textContent = fmt(r.analistasActivos);
  $('kCodigos').textContent = fmt(r.codigosContados);
  $('kPiezas').textContent = fmt(r.piezasContadas);
  $('kDif').textContent = fmt(r.itemsConDiferencia);
  $('kOk').textContent = fmt(r.itemsSinDiferencia);
  $('lastUpdate').textContent = 'Actualizado ' + new Date(r.generadoEn).toLocaleTimeString('es-VE');
}

async function loadFiltros() {
  const [tiendas, analistas] = await Promise.all([api('tiendas'), api('analistas')]);
  const selT = $('selTienda'), selA = $('selAnalista');
  tiendas.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.nombre;
    opt.textContent = t.nombre + (t.activa ? '' : ' (inactiva)');
    selT.appendChild(opt);
  });
  analistas.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.nombre;
    opt.textContent = a.nombre + (a.activo ? '' : ' (sin inventario activo)');
    selA.appendChild(opt);
  });
}

function renderVistaGeneral() {
  destroyCharts();
  $('content').innerHTML = `
    <div class="section-title">Vista general</div>
    <div class="card">
      <p class="empty-state">Selecciona una tienda o un analista arriba para ver el detalle de su avance.</p>
    </div>`;
}

// ---- Leyenda + gráfico de dona reutilizable, con % visibles sin necesidad de tocar ----
function pintarDona(canvas, segmentos) {
  const total = segmentos.reduce((s, x) => s + x.valor, 0) || 1;
  const chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: segmentos.map(s => s.nombre),
      datasets: [{ data: segmentos.map(s => s.valor), backgroundColor: segmentos.map(s => s.color) }]
    },
    options: {
      cutout: '62%',
      plugins: {
        legend: { display: false },
        datalabels: {
          color: '#fff', font: { family: 'JetBrains Mono', weight: '700', size: 11 },
          formatter: (v) => v > 0 ? Math.round((v / total) * 100) + '%' : ''
        }
      }
    }
  });
  chartRefs.push(chart);
  return segmentos.map(s => `
    <div class="row">
      <span class="dot" style="background:${s.color}"></span>
      <span class="name">${s.nombre}</span>
      <span class="val">${fmt(s.valor)}</span>
      <span class="pct">${total ? ((s.valor / total) * 100).toFixed(1) : '0.0'}%</span>
    </div>`).join('');
}

function pintarBarras(canvas, segmentos) {
  const total = segmentos.reduce((s, x) => s + x.valor, 0) || 1;
  const chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: segmentos.map(s => s.nombre),
      datasets: [{ data: segmentos.map(s => s.valor), backgroundColor: segmentos.map(s => s.color), borderRadius: 6 }]
    },
    options: {
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end', align: 'top', color: '#16202E',
          font: { family: 'JetBrains Mono', weight: '700', size: 12 },
          formatter: (v) => fmt(v) + '  (' + ((v / total) * 100).toFixed(1) + '%)'
        }
      },
      scales: { y: { beginAtZero: true, grace: '15%' } }
    }
  });
  chartRefs.push(chart);
  return segmentos.map(s => `
    <div class="row">
      <span class="dot" style="background:${s.color}"></span>
      <span class="name">${s.nombre}</span>
      <span class="val">${fmt(s.valor)}</span>
      <span class="pct">${((s.valor / total) * 100).toFixed(1)}%</span>
    </div>`).join('');
}

function tagsAnalistas(lista, onClick) {
  if (!lista || !lista.length) return '<span class="empty-state" style="padding:6px 0;">Sin analistas registrados.</span>';
  return lista.map(a => `
    <span class="tag" data-analista="${a.nombre}">
      ${a.nombre}${a.actual ? ' <span class="actual-flag">· actual</span>' : ''}
    </span>`).join('');
}

function tagsTiendas(lista) {
  if (!lista || !lista.length) return '<span class="empty-state" style="padding:6px 0;">Sin tiendas registradas.</span>';
  return lista.map(t => `
    <span class="tag" data-tienda="${t.nombre}">
      ${t.nombre}${t.actual ? ' <span class="actual-flag">· actual</span>' : ''}
    </span>`).join('');
}

// ==================== TIENDA ====================

async function renderTienda(nombre, contenedor) {
  contenedor = contenedor || $('content');
  showLoading(contenedor);
  const t = await api('tienda', { nombre });
  if (t.error) { contenedor.innerHTML = '<div class="card empty-state">No se encontró la tienda.</div>'; return; }

  if (contenedor === $('content')) destroyCharts();

  if (!t.activa) {
    contenedor.innerHTML = `
      <div class="section-title">Tienda · ${t.nombre}</div>
      <div class="card">
        <div class="detail-header">
          <h2>${t.nombre}</h2>
          <span class="badge off">Sin inventario activo</span>
        </div>
        <div class="stat-list">
          <div class="item"><div class="k">Supervisor</div><div class="v">${t.supervisor}</div></div>
          <div class="item"><div class="k">Fecha último inventario (inicio)</div><div class="v">${fmtDate(t.fechaApertura)}</div></div>
          <div class="item"><div class="k">Fecha de cierre</div><div class="v">${fmtDate(t.fechaCierre)}</div></div>
          <div class="item"><div class="k">Duración del último inventario</div><div class="v">${fmt(t.diasTranscurridos)} días</div></div>
        </div>
      </div>`;
    return;
  }

  const avance = t.stockTotal > 0 ? (t.codigosContados / t.stockTotal) * 100 : 0;
  const esNivelSuperior = contenedor === $('content');
  contenedor.innerHTML = `
    <div class="section-title">Tienda · ${t.nombre}</div>
    <div class="grid-2">
      <div class="card">
        <div class="detail-header">
          <h2>${t.nombre}</h2>
          <span class="badge on">Inventario activo</span>
        </div>
        <div class="progress-label"><b>${fmt(t.codigosContados)} códigos contados</b><span>${fmt(t.stockTotal)} en total</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.min(avance,100)}%"></div></div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;">${avance.toFixed(1)}% de avance</div>
        <div class="stat-list">
          <div class="item"><div class="k">Supervisor</div><div class="v">${t.supervisor}</div></div>
          <div class="item"><div class="k">Días transcurridos</div><div class="v">${fmt(t.diasTranscurridos)} días</div></div>
          <div class="item"><div class="k">Fecha de inicio</div><div class="v">${fmtDate(t.fechaApertura)}</div></div>
          <div class="item"><div class="k">Piezas contadas</div><div class="v">${fmt(t.piezasContadas)}</div></div>
        </div>
        <div class="k" style="margin-top:14px;">Analistas que han contado aquí${esNivelSuperior ? ' (toca uno para ver su detalle)' : ''}</div>
        <div class="tag-list">${tagsAnalistas(t.analistas)}</div>
        ${esNivelSuperior ? '<div class="sub-detail" id="subDetail" style="display:none;"></div>' : ''}
      </div>
      <div class="card">
        <canvas id="chartTienda"></canvas>
        <div class="chart-legend" id="legendTienda"></div>
      </div>
    </div>`;

  const restante = Math.max(t.stockTotal - t.codigosContados, 0);
  const legendHtml = pintarDona($('chartTienda'), [
    { nombre: 'Sin diferencia', valor: t.itemsSinDiferencia, color: '#3E9C6E' },
    { nombre: 'Con diferencia', valor: t.itemsConDiferencia, color: '#D5573B' },
    { nombre: 'Por contar', valor: restante, color: '#C7CEDA' }
  ]);
  $('legendTienda').innerHTML = legendHtml;

  if (esNivelSuperior) {
    contenedor.querySelectorAll('[data-analista]').forEach(tag => {
      tag.addEventListener('click', () => {
        contenedor.querySelectorAll('[data-analista]').forEach(x => x.classList.remove('selected'));
        tag.classList.add('selected');
        const sub = contenedor.querySelector('#subDetail');
        sub.style.display = 'block';
        renderAnalista(tag.dataset.analista, sub);
        sub.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });
  } else {
    // Ya estamos en un sub-detalle: no se anida otro nivel más, para mantenerlo simple.
    contenedor.querySelectorAll('[data-analista]').forEach(tag => { tag.style.cursor = 'default'; });
  }
}

// ==================== ANALISTA ====================

async function renderAnalista(nombre, contenedor) {
  contenedor = contenedor || $('content');
  showLoading(contenedor);
  const a = await api('analista', { nombre });
  if (a.error) { contenedor.innerHTML = '<div class="card empty-state">No se encontró el analista.</div>'; return; }

  if (contenedor === $('content')) destroyCharts();

  if (!a.activo) {
    contenedor.innerHTML = `
      <div class="section-title">Analista · ${a.nombre}</div>
      <div class="card">
        <div class="detail-header">
          <h2>${a.nombre}</h2>
          <span class="badge off">Sin inventario activo</span>
        </div>
        <p class="empty-state">Este analista no está participando en ningún inventario activo actualmente.</p>
        <div class="stat-list">
          <div class="item"><div class="k">Tienda actual asignada</div><div class="v">${a.tiendaAsignada || 'No asignada'}</div></div>
        </div>
      </div>`;
    return;
  }

  const esNivelSuperior = contenedor === $('content');
  contenedor.innerHTML = `
    <div class="section-title">Analista · ${a.nombre}</div>
    <div class="grid-2">
      <div class="card">
        <div class="detail-header">
          <h2>${a.nombre}</h2>
